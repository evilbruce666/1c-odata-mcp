# Конфигурация Smithery — https://smithery.ai/docs
# Локальный STDIO-сервер: Smithery отдаёт пользователю команду запуска,
# коннектор работает на его машине с его же доступом к 1С. Креды остаются
# у пользователя — Smithery их не хостит.
startCommand:
  type: stdio
  configSchema:
    # JSON Schema конфигурации, которую Smithery спросит у пользователя.
    type: object
    required:
      - baseUrl
      - username
      - password
    properties:
      baseUrl:
        type: string
        title: Адрес OData 1С
        description: >-
          Адрес опубликованного интерфейса OData вашей базы 1С, напр.
          https://terminal.scloud.ru/01/<база>/odata/standard.odata/
      username:
        type: string
        title: Логин
        description: Логин Basic-авторизации (обычно облачная учётная запись).
      password:
        type: string
        title: Пароль
        format: password
        description: Пароль Basic-авторизации.
      readOnly:
        type: boolean
        title: Только чтение
        default: true
        description: >-
          true (по умолчанию) — сервер не пишет в 1С, доступны только аналитика
          и чтение. Снимите для включения записи (см. также «Разрешить запись»).
      writable:
        type: boolean
        title: Разрешить запись в базу
        default: false
        description: >-
          Разрешает создание/изменение документов и справочников. Действует
          только вместе с readOnly=false. Каждая операция записи по умолчанию
          требует подтверждения (dry-run → confirm).
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '1c-odata-mcp'],
      env: {
        ODATA_BASE_URL: config.baseUrl,
        ODATA_USERNAME: config.username,
        ODATA_PASSWORD: config.password,
        READ_ONLY: String(config.readOnly !== false),
        ODATA_WRITABLE: String(config.writable === true)
      }
    })
  exampleConfig:
    baseUrl: https://terminal.scloud.ru/01/demo/odata/standard.odata/
    username: demo_user
    password: demo_password
    readOnly: true
    writable: false
