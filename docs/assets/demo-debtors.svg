<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>1c-odata-mcp — диалог с Claude</title>
  <desc>На вопрос «кто из покупателей должен больше всего» Claude вызывает get_debtors и отвечает списком должников и итоговой суммой 1 800 000 рублей из 1С</desc>

  <rect x="0" y="0" width="760" height="430" rx="16" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>

  <circle cx="52" cy="50" r="16" fill="#FAECE7"/>
  <text x="52" y="57" font-size="20" font-weight="500" fill="#993C1D" text-anchor="middle">*</text>
  <text x="80" y="46" font-size="15" font-weight="500" fill="#2C2C2A">Claude</text>
  <text x="80" y="64" font-size="12" fill="#888780">1c-odata-mcp · подключено к 1С</text>
  <rect x="632" y="36" width="100" height="26" rx="8" fill="#FAEEDA"/>
  <text x="682" y="53" font-size="12" font-weight="500" fill="#854F0B" text-anchor="middle">1С · OData</text>

  <line x1="28" y1="86" x2="732" y2="86" stroke="#E8E6DE" stroke-width="1"/>

  <rect x="336" y="104" width="396" height="40" rx="12" fill="#F1EFE8"/>
  <text x="354" y="129" font-size="14" fill="#2C2C2A">Кто из покупателей должен больше всего и на сколько?</text>

  <circle cx="44" cy="180" r="14" fill="#FAECE7"/>
  <text x="44" y="186" font-size="17" font-weight="500" fill="#993C1D" text-anchor="middle">*</text>

  <rect x="70" y="166" width="196" height="26" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
  <text x="84" y="183" font-size="12" fill="#0F6E56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">✓</text>
  <text x="98" y="183" font-size="12" fill="#5F5E5A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">get_debtors · база «ip»</text>

  <text x="70" y="218" font-size="15" fill="#2C2C2A">Топ дебиторов на сегодня:</text>

  <rect x="70" y="232" width="662" height="120" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
  <text x="90" y="259" font-size="13" font-weight="500" fill="#B4B2A9">1</text>
  <text x="116" y="259" font-size="15" fill="#2C2C2A">ООО «Ромашка»</text>
  <text x="712" y="259" font-size="15" fill="#2C2C2A" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">1 240 500 ₽</text>
  <line x1="70" y1="272" x2="732" y2="272" stroke="#E8E6DE" stroke-width="1"/>
  <text x="90" y="299" font-size="13" font-weight="500" fill="#B4B2A9">2</text>
  <text x="116" y="299" font-size="15" fill="#2C2C2A">ИП Иванов</text>
  <text x="712" y="299" font-size="15" fill="#2C2C2A" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">318 000 ₽</text>
  <line x1="70" y1="312" x2="732" y2="312" stroke="#E8E6DE" stroke-width="1"/>
  <text x="90" y="339" font-size="13" font-weight="500" fill="#B4B2A9">3</text>
  <text x="116" y="339" font-size="15" fill="#2C2C2A">ООО «Берёзка»</text>
  <text x="712" y="339" font-size="15" fill="#2C2C2A" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">94 050 ₽</text>

  <rect x="70" y="368" width="662" height="46" rx="8" fill="#E1F5EE"/>
  <text x="88" y="396" font-size="13" fill="#0F6E56">Всего по счёту 62 (дебиторка)</text>
  <text x="712" y="397" font-size="20" font-weight="500" fill="#04342C" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">1 800 000 ₽</text>
</svg>
